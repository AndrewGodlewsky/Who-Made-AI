<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Figures Network — Connected by Topics</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #070b14;
  color: #e2e8f0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

header {
  padding: 10px 20px;
  background: #0d1117;
  border-bottom: 1px solid #1f2937;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  z-index: 10;
}

header h1 {
  font-size: 17px;
  font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

#search {
  background: #161d2a;
  border: 1px solid #2d3748;
  border-radius: 8px;
  padding: 5px 12px;
  color: #e2e8f0;
  font-size: 13px;
  width: 200px;
  outline: none;
  transition: border-color 0.2s;
}
#search::placeholder { color: #4b5563; }
#search:focus { border-color: #4361ee; }

.header-hint { font-size: 11px; color: #374151; white-space: nowrap; }
.header-stats { margin-left: auto; font-size: 11px; color: #4b5563; white-space: nowrap; }

.main { display: flex; flex: 1; overflow: hidden; }

#sidebar {
  width: 230px;
  background: #0d1117;
  border-right: 1px solid #1a2234;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 14px 12px;
  scrollbar-width: thin;
  scrollbar-color: #1f2937 transparent;
}

.sidebar-section { margin-bottom: 18px; }
.sidebar-section h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #4b5563;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #1a2234;
}

.domain-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 12px;
  cursor: default;
}

.domain-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.domain-count { margin-left: auto; font-size: 10px; color: #4b5563; }
.topics-grid { display: flex; flex-direction: column; gap: 3px; }

.topic-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 8px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid #1a2234;
  transition: all 0.2s;
  background: #0d1117;
  color: #6b7280;
  user-select: none;
}
.topic-chip:hover { border-color: #2d3748; color: #9ca3af; background: #161d2a; }
.topic-chip.active { background: var(--tc-bg); border-color: var(--tc-border); color: var(--tc-color); }

.topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.topic-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

.btn-clear {
  display: block; width: 100%; padding: 5px;
  background: transparent; border: 1px solid #1a2234; border-radius: 6px;
  color: #4b5563; font-size: 11px; cursor: pointer; text-align: center;
  margin-top: 8px; transition: all 0.2s;
}
.btn-clear:hover { border-color: #2d3748; color: #9ca3af; }

#graph-container { flex: 1; position: relative; overflow: hidden; }

svg { width: 100%; height: 100%; }

.node { cursor: pointer; }
.node circle { transition: r 0.15s; }
.node .node-label {
  font-size: 9.5px;
  fill: #e2e8f0;
  stroke: #070b14;
  stroke-width: 2.8px;
  paint-order: stroke fill;
  pointer-events: none;
  text-anchor: middle;
  font-weight: 500;
}
.link { fill: none; pointer-events: none; }

#tooltip {
  position: absolute; bottom: 16px; right: 16px;
  background: #0d1117; border: 1px solid #1f2937; border-radius: 12px;
  padding: 14px 16px; width: 270px; pointer-events: none;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s; z-index: 100;
}
#tooltip.visible { opacity: 1; transform: translateY(0); }
.tt-name { font-size: 15px; font-weight: 700; color: #f9fafb; margin-bottom: 2px; }
.tt-role { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.tt-org { font-size: 12px; color: #60a5fa; margin-bottom: 10px; }
.tt-topics { display: flex; flex-wrap: wrap; gap: 4px; }
.tt-tag { padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 500; border: 1px solid; }

.zoom-controls {
  position: absolute; bottom: 16px; left: 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.zoom-btn {
  width: 28px; height: 28px; background: #0d1117; border: 1px solid #1f2937;
  border-radius: 6px; color: #9ca3af; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.zoom-btn:hover { background: #161d2a; color: #e2e8f0; }

#conn-badge {
  position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
  background: #0d1117; border: 1px solid #1f2937; border-radius: 8px;
  padding: 4px 12px; font-size: 11px; color: #6b7280;
  pointer-events: none; transition: opacity 0.2s; max-width: 480px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

#info-panel {
  position: absolute; top: 12px; right: 12px;
  width: 290px;
  background: #0d1117;
  border: 1px solid #1f2937;
  border-radius: 12px;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 90;
}
#info-panel.visible { opacity: 1; transform: translateY(0); }
#ip-accent { height: 3px; width: 100%; }
#ip-body { padding: 12px 14px 14px; }
#ip-name { font-size: 14px; font-weight: 700; color: #f9fafb; margin-bottom: 2px; }
#ip-role { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
#ip-org  { font-size: 11px; color: #60a5fa; margin-bottom: 10px; }
#ip-bio  {
  font-size: 11.5px; line-height: 1.55; color: #9ca3af;
  max-height: 160px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #1f2937 transparent;
}

/* ── People Panel ── */
#people-panel {
  width: 190px;
  background: #090d16;
  border-right: 1px solid #1a2234;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.pp-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid #1a2234;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.pp-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #4b5563;
}

#pp-count {
  font-size: 10px;
  color: #374151;
  margin-left: auto;
}

#pp-clear {
  background: none;
  border: 1px solid #1a2234;
  color: #4b5563;
  cursor: pointer;
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 4px;
  display: none;
  transition: all 0.15s;
  line-height: 1.4;
}
#pp-clear:hover { border-color: #2d3748; color: #9ca3af; }

#pp-list {
  flex: 1;
  overflow-y: auto;
  padding: 5px 6px;
  scrollbar-width: thin;
  scrollbar-color: #1f2937 transparent;
}

.pp-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 7px;
  border-radius: 6px;
  font-size: 11.5px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  color: #6b7280;
  user-select: none;
  border: 1px solid transparent;
}
.pp-item:hover { background: #161d2a; color: #d1d5db; }

.pp-item.pp-selected {
  background: rgba(96,165,250,0.10);
  border-color: rgba(96,165,250,0.25);
  color: #f9fafb;
  font-weight: 600;
}
.pp-item.pp-neighbor {
  color: #c4cada;
}

.pp-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Research Panel ── */
#research-panel {
  width: 0;
  min-width: 0;
  background: #080d18;
  border-left: 1px solid #1a2234;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              min-width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
#research-panel.visible {
  width: 560px;
  min-width: 560px;
}
.rp-accent-bar {
  height: 3px;
  width: 100%;
  flex-shrink: 0;
}
.rp-header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid #1a2234;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-shrink: 0;
  background: #0d1117;
}
.rp-info { flex: 1; min-width: 0; }
.rp-name {
  font-size: 15px;
  font-weight: 700;
  color: #f9fafb;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rp-role-org {
  font-size: 11px;
  color: #6b7280;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rp-close {
  background: none;
  border: 1px solid #1a2234;
  color: #4b5563;
  cursor: pointer;
  font-size: 13px;
  width: 24px;
  height: 24px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  margin-top: 1px;
}
.rp-close:hover { border-color: #374151; color: #9ca3af; background: #161d2a; }
.rp-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px 40px;
  scrollbar-width: thin;
  scrollbar-color: #1f2937 transparent;
  color: #c4cada;
  font-size: 13.5px;
  line-height: 1.75;
}
.rp-content h1 { display: none; }
.rp-content h2 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #4b5563;
  margin: 28px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #151c2b;
}
.rp-content h3 {
  font-size: 13.5px;
  font-weight: 600;
  color: #9ca3af;
  margin: 16px 0 6px;
}
.rp-content p {
  margin-bottom: 10px;
  color: #c4cada;
}
.rp-content strong { color: #e2e8f0; font-weight: 600; }
.rp-content em { color: #8fa3be; font-style: italic; }
.rp-content ul {
  padding-left: 20px;
  margin-bottom: 10px;
}
.rp-content li { margin-bottom: 4px; }
.rp-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 12.5px;
  table-layout: auto;
}
.rp-content th {
  text-align: left;
  padding: 7px 10px;
  background: #0a0f1a;
  border: 1px solid #1a2234;
  color: #6b7280;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.rp-content td {
  padding: 7px 10px;
  border: 1px solid #1a2234;
  color: #c4cada;
  vertical-align: top;
  word-break: break-word;
}
.rp-content tr:nth-child(even) td { background: rgba(10,15,26,0.5); }
.rp-content blockquote {
  border-left: 3px solid #1e3050;
  padding: 6px 16px;
  color: #7c8fa8;
  margin: 10px 0;
  font-style: italic;
  background: rgba(30,48,80,0.15);
  border-radius: 0 5px 5px 0;
}
.rp-content code {
  background: #161d2a;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
  color: #60a5fa;
  font-family: monospace;
}
.rp-content hr {
  border: none;
  border-top: 1px solid #1a2234;
  margin: 24px 0;
}
.rp-content a { color: #60a5fa; text-decoration: none; }
.rp-content a:hover { text-decoration: underline; }

.rp-toc {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 12px 14px 14px;
  background: #0a0f1a;
  border: 1px solid #1a2234;
  border-radius: 8px;
  margin-bottom: 22px;
}
.rp-toc-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: #374151;
  margin-bottom: 8px;
}
.rp-toc a {
  font-size: 12px;
  color: #5a6a80;
  text-decoration: none !important;
  padding: 3px 8px;
  border-radius: 5px;
  border: 1px solid transparent;
  transition: all 0.15s;
  display: block;
}
.rp-toc a:hover {
  color: #c4cada;
  background: #161d2a;
  border-color: #1a2234;
}

.rp-summary {
  font-size: 13px;
  line-height: 1.7;
  color: #8fa3be;
  padding: 13px 16px;
  background: rgba(20, 35, 60, 0.35);
  border-left: 3px solid #1e3555;
  border-radius: 0 6px 6px 0;
  margin-bottom: 22px;
}
</style>
</head>
<body>

<header>
  <h1>★ AI Figures Network</h1>
  <input type="text" id="search" placeholder="Search people…">
  <span class="header-hint">Hover a node · Click topics to reveal connections</span>
  <div class="header-stats" id="header-stats">114 people · 25 topics</div>
</header>

<div class="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <h3>Domains</h3>
      <div id="domain-legend"></div>
    </div>
    <div class="sidebar-section">
      <h3>Topics — Click to Connect</h3>
      <div class="topics-grid" id="topic-filters"></div>
      <button class="btn-clear" id="clear-topics">Clear All Topics</button>
    </div>
  </div>

  <div id="people-panel">
    <div class="pp-header">
      <span class="pp-title">Figures</span>
      <span id="pp-count"></span>
      <button id="pp-clear" title="Show all">Clear</button>
    </div>
    <div id="pp-list"></div>
  </div>

  <div id="graph-container">
    <svg id="graph">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="zoom-root">
        <g id="links-layer"></g>
        <g id="nodes-layer"></g>
      </g>
    </svg>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">&#8722;</button>
      <button class="zoom-btn" id="zoom-reset" style="font-size:12px">&#8962;</button>
    </div>
    <div id="conn-badge" style="opacity:0"></div>
    <div id="info-panel">
      <div id="ip-accent"></div>
      <div id="ip-body">
        <div id="ip-name"></div>
        <div id="ip-role"></div>
        <div id="ip-org"></div>
        <div id="ip-bio"></div>
      </div>
    </div>
  </div>

  <div id="research-panel">
    <div class="rp-accent-bar" id="rp-accent"></div>
    <div class="rp-header">
      <div class="rp-info">
        <div class="rp-name" id="rp-name">Research Profile</div>
        <div class="rp-role-org" id="rp-role-org"></div>
      </div>
      <button class="rp-close" id="rp-close" title="Close">&#10005;</button>
    </div>
    <div class="rp-content" id="rp-content"></div>
  </div>
</div>

<div id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="data/research-data.js"></script>
<script src="data/summaries-data.js"></script>
<script>
// ═══════════════════════════════════════
//  STATIC DATA
// ═══════════════════════════════════════

const DOMAINS = {

const PEOPLE = [
  // Academic Researchers

  { id:"vaswani",     name:"Ashish Vaswani",       role:"Co-Inventor of Transformers",                    org:"Essential AI",                           domain:"research", size:8,  topics:["transformers","nlp","llms","deep_learning"] },

  he:          "Inventor of ResNet (Residual Networks), solving the vanishing gradient problem in very deep networks through skip connections. ResNet enabled 100+ layer networks and is among the most-cited AI papers in history. Also co-invented Mask R-CNN for instance segmentation, now standard in autonomous vehicles and robotics.",
  simonyan:    "Co-creator of VGGNet, which established depth (using small 3x3 convolutions) as a key factor in visual recognition. Her work with Zisserman won ImageNet 2014 and VGG features remain widely used as pretrained baselines. Also pioneered deep dream visualization techniques revealing what neural networks learn to see.",
  karpathy:    "Former VP of AI at Tesla leading the computer vision team for Autopilot. Co-authored early ImageNet extensions and pioneered image captioning. Known for making AI education radically accessible through Stanford lectures and YouTube tutorials. Founded a new AI education venture in 2023 after leaving Tesla.",
  sutton:      "The father of modern reinforcement learning, co-author of the definitive RL textbook with Barto. His 'Bitter Lesson' argues general methods leveraging compute always beat specialized domain knowledge — a hugely influential thesis. Pioneered temporal-difference learning and policy gradient methods foundational to how modern AI learns from experience.",
  silver:      "Led the AlphaGo project at DeepMind, creating the first AI to defeat a world Go champion — a milestone thought to be decades away. Developed AlphaZero, mastering chess, shogi, and Go from self-play alone. His work integrates deep RL with Monte Carlo Tree Search for superhuman strategic reasoning in complex domains.",
  abbeel:      "Pioneer of learning from demonstration (imitation learning) and deep RL for robotics. Professor at UC Berkeley and now head of Amazon's LLM organization. Co-founded Covariant.ai for robot manipulation. Created influential RL education resources; his students lead major robotics and AI labs worldwide.",
  levine:      "Leading researcher in deep RL for robotics and co-founder of Physical Intelligence (pi.ai), valued at $2B, building general-purpose robot learning models. His RAIL lab at UC Berkeley advances offline RL, imitation learning, and the integration of foundation models with robotic control systems.",
  finn:        "Inventor of Model-Agnostic Meta-Learning (MAML), enabling models to quickly adapt to new tasks with minimal data. Stanford professor bridging meta-learning and robotics. Her work on learning to learn has influenced both AI research architecture and practical robotic systems that must generalize from limited demonstrations.",
  schulman:    "Co-inventor of Proximal Policy Optimization (PPO), the most widely used RL algorithm, and a key architect of RLHF — the technique that made ChatGPT align with human preferences. Co-founded OpenAI and later joined Anthropic to continue alignment research focused on making powerful AI reliably safe.",
  breazeal:    "Pioneer of social robotics and human-robot interaction. Created Kismet and Jibo, early social robots designed to communicate naturally with people. MIT Media Lab professor whose work explores robots as companions, educators, and collaborators. Founded Jibo Inc. to commercialize social robot technology for homes.",
  fan:         "NVIDIA research scientist leading Embodied AI — building foundation models for physical robots. His GR00T project aims to create a universal robot model that transfers skills from simulation to real-world environments at scale. Formerly at Stanford and OpenAI, shaping how humanoid robots will learn general behaviors.",
  yudkowsky:   "Founder of MIRI and the most prominent voice arguing AI existential risk is immediate and severe. Popularized 'friendly AI' concepts and wrote extensively that misaligned superintelligence is humanity's most pressing existential threat. His LessWrong writings built the global rationalist community focused on AI safety and existential risk.",
  bostrom:     "Oxford philosopher and author of 'Superintelligence' (2014), which brought AI existential risk into mainstream academic and policy discourse. Founded Oxford's Future of Humanity Institute. His orthogonality thesis and instrumental convergence arguments formalize why advanced AI might pursue goals misaligned with human values.",
  russell:     "UC Berkeley professor and co-author of 'Artificial Intelligence: A Modern Approach,' the most widely used AI textbook. Founder of CHAI. Author of 'Human Compatible,' proposing AI should be uncertain about human preferences and defer to them rather than optimize fixed objectives — a foundational alignment proposal.",
  christiano:  "Key developer of RLHF (Reinforcement Learning from Human Feedback), the technique that made InstructGPT and ChatGPT follow human instructions. Founded the Alignment Research Center (ARC). Represents a technically optimistic alignment approach, believing prosaic methods can solve alignment before transformative AI arrives.",
  leike:       "Former head of OpenAI's Superalignment team, aiming to solve superintelligent AI alignment within four years. Left OpenAI publicly citing safety culture concerns to join Anthropic. His work focuses on scalable oversight — helping humans supervise AI systems that are more capable than them through debate and amplification.",
  buolamwini:  "MIT researcher and founder of the Algorithmic Justice League. Her landmark 'Gender Shades' study (2018) showed major tech companies' facial recognition had dramatically higher error rates on darker-skinned women. Her advocacy led to facial recognition bans in multiple US cities; featured in the documentary 'Coded Bias.'",
  gebru:       "Former Google AI ethics co-lead whose firing in 2020 — after submitting an unapproved paper on LLM risks — sparked global debate about corporate AI ethics. Founded the independent DAIR Institute. Pioneered Model Cards and Datasheets for Datasets, now standard tools for documenting AI systems' limitations and biases.",
  crawford:    "Research Professor at USC and author of 'Atlas of AI' (2021), mapping the hidden environmental, labor, and political costs of AI systems. Senior Principal Researcher at Microsoft Research. Her work reveals how AI encodes social power structures and subjects those systems to rigorous empirical and historical scrutiny.",
  birhane:     "Cognitive scientist at Mozilla Foundation who critically examines assumptions embedded in AI datasets and models. Her research reveals popular training datasets contain harmful biases that AI systems amplify. Advocates for centering affected communities in AI development decisions rather than treating ethics as a technical add-on.",
  abebe:       "Computer scientist at UC Berkeley working at the intersection of algorithms and social good. Co-founder of Black in AI to increase representation of Black researchers. Her research examines how optimization systems affect marginalized communities and proposes algorithmic interventions that address — rather than entrench — inequality.",
  mmitchell:   "AI researcher who co-created Model Cards, now a standard documentation practice for ML models. Pioneer of responsible AI at Google Brain before her firing in 2021. Now Chief Ethics Scientist at Hugging Face, developing frameworks and tooling for ethical, transparent, and openly accessible AI development.",
  altman:      "CEO of OpenAI, which he transformed from a research nonprofit into the company that launched the modern AI era with ChatGPT in November 2022. Survived a dramatic board ouster in 2023. Under his leadership, OpenAI raised over $40B in 2025 and became the defining company of the current AI age.",
  dario:       "CEO and co-founder of Anthropic, which he founded after leaving OpenAI over safety concerns. Anthropic developed the Claude model series and pioneered Constitutional AI — training models to be helpful, harmless, and honest through self-critique. Positioning Anthropic as the safety-first AI lab with a public benefit corporation structure.",
  daniela:     "President and co-founder of Anthropic, managing operations and business strategy while her brother Dario leads technical direction. Previously VP of Operations at OpenAI. Key architect of Anthropic's $4B partnership with Amazon AWS and its enterprise go-to-market approach targeting developers and businesses.",
  huang:       "Co-founder and CEO of NVIDIA, whose pivot from gaming GPUs to AI accelerators made NVIDIA briefly the world's most valuable company. The H100 and Blackwell GPU families are the essential infrastructure for AI training globally. His theatrical product launches and visionary positioning made him the AI era's most iconic hardware CEO.",
  zuck:        "CEO of Meta who made an aggressive bet on open-source AI with the Llama series, releasing model weights publicly. Meta AI is now a major force in both LLMs and computer vision research. His open-source strategy democratizes access but raises questions about safety when powerful models are freely available to anyone.",
  musk:        "Co-founded OpenAI in 2015 before departing over control disputes, then founded xAI in 2023, releasing the Grok LLM integrated into X. Drives autonomous vehicle AI at Tesla. His AI risk warnings have contrasted with aggressive deployment. Now the world's wealthiest person and a polarizing AI policy figure.",
  pichai:      "CEO of Google and Alphabet who navigated the ChatGPT disruption by launching Gemini and merging Google Brain with DeepMind. His strategy centers AI-first transformation across Search, Workspace, and Google Cloud, affecting billions of users. Oversaw Google's evolution from cautious AI deployer to aggressive product launcher.",
  nadella:     "CEO of Microsoft who made the bold $13B investment in OpenAI and integrated AI across Bing, Office 365, Azure, and GitHub Copilot. Transformed Microsoft into an AI-first enterprise powerhouse. His 'growth mindset' philosophy and strategic foresight gave Microsoft an AI lead few anticipated from its 2022 starting position.",
  hassabis:    "Co-founder and CEO of Google DeepMind. Created AlphaGo (first to defeat a Go world champion), AlphaFold (solving protein structure — a 50-year biology challenge), and AlphaZero. His computational neuroscience background informs a vision of AI inspired by the brain. Nobel Prize in Chemistry 2024 for AlphaFold.",
  brockman:    "Co-founder and former President of OpenAI, instrumental in building it from a small research nonprofit into the defining AI company. Played a central role during the 2023 board crisis. Took a leave of absence in 2024. Has been OpenAI's key technical executor, talent magnet, and public face alongside Sam Altman.",
  murati:      "Former CTO of OpenAI during the critical deployment period of GPT-4 and ChatGPT. Led the technical organization through OpenAI's rapid commercialization. Left in 2024 to found Thinking Machines Lab. Known as an effective bridge between OpenAI's research culture and its product, safety, and operational ambitions.",
  sutskever:   "Co-founder and former Chief Scientist of OpenAI, responsible for key technical decisions driving the GPT series and alignment research. Played a pivotal and controversial role in the 2023 board crisis. Left to found Safe Superintelligence Inc. (SSI), focused purely on alignment research before deploying any products.",
  suleyman:    "Co-founder of DeepMind and CEO of Microsoft AI. Co-founded Inflection AI (Pi assistant) before joining Microsoft to lead Copilot AI products. Author of 'The Coming Wave,' arguing AI will be humanity's defining challenge. Advocates pragmatic safety frameworks while building and deploying AI products at massive scale.",
  su:          "CEO of AMD who challenged NVIDIA's GPU monopoly for AI workloads with the MI300X accelerators. Her engineering leadership transformed AMD from near-bankruptcy to a $200B+ company. The open ROCm software ecosystem she championed provides an alternative to CUDA for AI training, increasing competitive diversity in AI hardware.",
  dean:        "Co-creator of MapReduce, BigTable, and TensorFlow — the infrastructure powering AI at global scale. Co-founder of Google Brain and Chief Scientist at Google. His team created word2vec, co-authored the Transformer, and built early TPUs. One of the most impactful systems engineers in AI infrastructure history.",
  kaifulee:    "Pioneer of speech recognition at Apple (Siri's precursor) and former head of Google China. Author of 'AI Superpowers,' framing China and the US as the two dominant AI powers. Founded 01.AI, a top Chinese LLM startup. Influential voice on AI's economic displacement effects and the US-China AI competition.",
  son:         "CEO of SoftBank and one of history's largest AI investors through the $100B SoftBank Vision Fund. His $32B stake in ARM Holdings is foundational for AI chip design. Co-architect of the $500B Stargate AI infrastructure project in the US. Declared that artificial superintelligence will arrive within a decade.",
  sacks:       "Silicon Valley venture capitalist (Craft Ventures, PayPal Mafia) appointed as the first White House AI and Crypto Czar in 2025 by President Trump. Tasked with creating regulatory frameworks for US AI development, ensuring American AI dominance over China, and managing government policy on AI as a geopolitical resource.",
  rombach:     "Lead author of the latent diffusion model paper that became Stable Diffusion — the open-source image generator downloaded millions of times worldwide. Left Stability AI to co-found Black Forest Labs with other original researchers, building FLUX as the next generation open image model with superior photorealism.",
  holz:        "Co-founder of Leap Motion (hand-tracking hardware) before founding Midjourney. Built Midjourney into one of the most-used creative AI tools globally, profitable without venture funding. Midjourney V6 and V7 pushed boundaries of photorealistic image generation and became central to public debate about AI art and creativity.",
  ho:          "Google Brain researcher who published the DDPM (Denoising Diffusion Probabilistic Models) paper in 2020, providing the theoretical foundation for modern diffusion-based image generation. His work demonstrated diffusion models could match and surpass GANs, directly enabling DALL-E 3, Stable Diffusion, and Midjourney.",
  marcus:      "Cognitive scientist and AI critic arguing current deep learning cannot achieve true intelligence without symbolic reasoning and structure. CEO of Robust AI. His book 'Rebooting AI' critiques hype and advocates neurosymbolic hybrid AI. A prolific public debater challenging AI capabilities claims and questioning the scaling hypothesis.",
  pearl:       "Turing Award winner and creator of Bayesian networks and modern causal inference theory. His 'Book of Why' argues correlation-based ML cannot understand causation, which is essential for genuine intelligence. His 'ladder of causation' framework distinguishes seeing, doing, and counterfactual reasoning in AI systems.",
  scholkopf:   "Director at MPI for Intelligent Systems and pioneer of kernel methods (SVMs) and causal representation learning. His work on invariant causal prediction builds ML models that generalize across environments by learning causal structures rather than spurious correlations, bridging statistical ML theory and causal science.",
  goertzel:    "CEO of SingularityNET and chief architect of OpenCog, an open-source AGI framework combining neural networks, probabilistic logic, and evolutionary learning. One of the most vocal AGI advocates, believing general intelligence is achievable in the near term through cognitive architecture rather than pure scale.",
  jordan:      "Pioneered probabilistic graphical models and variational inference foundational to modern Bayesian ML. Called the Michael Jordan of machine learning. Berkeley professor bridging statistical learning theory, distributed optimization, and the economics of AI deployment. A measured skeptic of near-term AGI timelines.",
  welling:     "VP Research at Qualcomm AI and professor at the University of Amsterdam. Pioneer of graph neural networks (with Kipf), variational autoencoders (with Kingma), and geometric deep learning. Advocates for physics-inspired, energy-efficient AI and applying structural deep learning priors to molecular and scientific discovery.",
  koller:      "Co-founder of Coursera with Andrew Ng, democratizing university education online. Author of the definitive probabilistic graphical models textbook. Founded insitro to apply ML to drug discovery at scale. A rare figure who bridges rigorous academic ML theory with real-world biotech and pharmaceutical applications.",
  liang:       "Director of Stanford's Center for Research on Foundation Models (CRFM). Created HELM (Holistic Evaluation of Language Models), rigorous multidimensional LLM benchmarking. His work examines foundation model limitations and advocates for transparency and reproducibility in how we measure and report AI capabilities.",
  mitchellm:   "Professor at the Santa Fe Institute and author of 'Artificial Intelligence: A Guide for Thinking Humans,' offering a grounded critique of AI capabilities claims. Her research on analogy-making and visual reasoning reveals the gap between human cognition and current AI systems, promoting scientific rigor over hype.",
  norvig:      "Distinguished Researcher at Google and co-author (with Stuart Russell) of 'Artificial Intelligence: A Modern Approach,' the most widely used AI textbook globally. Former Director of Research at Google and NASA Ames researcher. A rare figure bridging academic AI theory, practical systems engineering, and policy advice.",
  fridman:     "MIT researcher and podcaster whose long-form interviews with AI pioneers — Hinton, LeCun, Musk, Altman, and hundreds more — have reached tens of millions and shaped how AI is understood publicly. His own research focuses on autonomous vehicles and human-robot interaction at MIT's autonomous systems lab.",
  quoc:        "Google Brain research scientist who pioneered neural architecture search (NAS) — using AI to automatically design better AI architectures. Co-invented word2vec embeddings and sequence-to-sequence learning for machine translation. His AutoML work democratizes model creation without manual architecture engineering expertise.",
  vinyals:     "VP of Research at Google DeepMind and creator of AlphaStar, the first AI to reach Grandmaster level in StarCraft II. Co-invented sequence-to-sequence learning and the pointer network. His work spans game AI, NLP, and multi-agent systems — demonstrating AI can master complex real-time strategy requiring long-horizon planning.",
  donti:       "Co-founder of Climate Change AI, catalyzing AI applications to combat climate change across energy grids, weather forecasting, and carbon markets. Her technical work applies machine learning to power systems optimization with formal safety guarantees. Advocates for AI governance that accounts for sustainability and environmental impact.",
  samy:        "Research scientist at Apple AI Research (formerly Google Brain) and brother of Yoshua Bengio. Pioneer of curriculum learning — training models by ordering examples from easy to hard, mimicking human pedagogy. Contributed to adversarial training, generative models, and NLP systems across academia and major industry labs.",
  hoffman:     "LinkedIn co-founder and one of Silicon Valley's most influential AI investors. Early backer of OpenAI and DeepMind. Co-founded Inflection AI (Pi chatbot) before its talent was largely acquired by Microsoft. Author of 'Impromptu' on AI's societal impact. Advocates for AI as a tool that augments rather than replaces human work.",

  // Historical Pioneers
  turing:      "The foundational theorist of computation and artificial intelligence. His 1950 paper 'Computing Machinery and Intelligence' posed the Turing Test and the question 'Can machines think?' His wartime work at Bletchley Park breaking Nazi Enigma codes is credited with shortening World War II. He conceived the universal Turing machine — the abstract blueprint for every modern computer.",
  shannon:     "Created information theory in his 1948 paper 'A Mathematical Theory of Communication,' quantifying information with entropy and enabling all modern digital communication, data compression, and cryptography. At Bell Labs he also built early chess-playing programs and contributed foundational ideas about how machines could learn and reason.",
  wiener:      "Founded cybernetics — the science of control and communication in animals and machines — with his 1948 book 'Cybernetics.' His ideas about feedback loops, self-regulating systems, and goal-directed behavior laid philosophical and mathematical groundwork for AI, robotics, and systems theory. Among the first to warn of automation's societal consequences.",
  mccarthy:    "Coined the term 'Artificial Intelligence' and organized the 1956 Dartmouth Conference that founded AI as a field. Invented Lisp, still the dominant language of AI research for decades. Created early planning systems and situation calculus. Believed passionately in symbolic AI and the possibility of machines that reason as rigorously as mathematicians.",
  minsky:      "Co-founder of the MIT AI Laboratory and author of 'Perceptrons' (1969), 'The Society of Mind' (1986), and 'The Emotion Machine.' Pioneered symbolic AI, frames for knowledge representation, and neural network theory. His Turing Award lecture argued that human-level AI requires machines to understand how they themselves work — a central AGI challenge.",
  newell:      "With Herbert Simon, built the first running AI program — the Logic Theorist (1956) and General Problem Solver. Pioneered cognitive architectures, production systems, and the physical symbol system hypothesis: the idea that intelligence requires symbol manipulation. His ACT-R framework influenced decades of cognitive science research.",
  hsimon:      "Won both the Nobel Prize in Economics and the Turing Award — one of very few people to do so. His bounded rationality theory transformed economics and decision science. With Newell, built the first working AI programs. Pioneered human problem-solving models that became the foundation of cognitive science and behavioral economics.",
  rosenblatt:  "Invented the Perceptron in 1957 at the Cornell Aeronautical Laboratory — the first machine capable of learning to classify patterns from examples. His work demonstrated that machines could learn rather than just execute fixed rules. Though Minsky and Papert's 1969 critique stalled neural network research for decades, Rosenblatt's perceptron is the direct ancestor of every modern neural network.",
  weizenbaum:  "Created ELIZA (1966) at MIT, the first conversational chatbot. ELIZA simulated a therapist using pattern matching — and its ability to make users feel understood by a machine disturbed Weizenbaum deeply. His book 'Computer Power and Human Reason' (1976) argued passionately that some human decisions must never be delegated to machines, anticipating today's AI ethics debates.",
  feigenbaum:  "Father of expert systems, encoding domain expertise into rules that machines could use to reason in medicine, chemistry, and engineering. His MYCIN (with colleagues) diagnosed bacterial infections and recommended antibiotics — better than many junior doctors. Won the Turing Award in 1994. Argued that knowledge, not just compute, is what makes AI powerful.",
  zadeh:       "Introduced fuzzy logic in 1965 as a way for machines to handle the imprecision and ambiguity of real-world concepts — a sharp contrast to classical Boolean logic. Fuzzy systems became foundational to industrial control systems, consumer electronics, and later expert system reasoning. His work demonstrated that uncertainty could be modeled rigorously rather than eliminated.",
  winograd:    "Created SHRDLU (1972), an AI that could converse about and manipulate a simulated blocks world in natural English — a landmark in NLP. Later argued in 'Understanding Computers and Cognition' (with Flores) that AI systems cannot truly understand language without embodiment and social context. His student Sergey Brin went on to co-found Google.",
  rumelhart:   "Co-developed the backpropagation algorithm (1986) with Hinton and Williams, solving the key problem of how multi-layer neural networks could learn. Also pioneered distributed representations, connectionist cognitive models, and recurrent networks. His two-volume 'Parallel Distributed Processing' (1986) launched the first connectionist revolution in AI and cognitive science.",
  asamuel:     "Wrote the first self-learning checkers program at IBM in the 1950s, coining the term 'machine learning' in 1959. His program improved by playing against itself — a strategy rediscovered decades later in AlphaGo and modern RLHF. One of the earliest demonstrations that machines could improve through experience rather than explicit programming.",
  mcculloch:   "With Walter Pitts, published 'A Logical Calculus of the Ideas Immanent in Nervous Activity' (1943) — the paper that introduced the mathematical model of the neuron. This foundational work showed how logical operations could be performed by networks of binary neurons, directly inspiring both the perceptron and all subsequent neural network research.",

  // Policy & Governance
  ian_hogarth: "Technology investor who became Chair of the UK AI Safety Institute (AISI) after his influential essay 'We Must Slow Down the Race to God-Like AI.' AISI became the world's first government body dedicated to AI safety evaluation, testing frontier models before and after deployment. A key architect of the UK's role in global AI governance.",
  marietje:    "Former Dutch MEP and now International Policy Director at Stanford's Cyber Policy Center. One of Europe's leading voices on technology regulation, she has spent years advocating for rights-respecting AI governance. Her work bridges academic AI research and binding regulation, arguing that democratic values must be embedded in AI systems by design.",
  vdignum:     "Professor of Responsible AI at Umeå University and a UNESCO expert who helped craft UNESCO's Recommendation on the Ethics of AI (2021). Co-founder of HUMANE-AI Net. Her AAMAS framework for AI governance focuses on accountability, responsibility, and transparency. One of Europe's foremost academic voices linking AI ethics to enforceable policy.",
  rumman:      "US Science Envoy for AI and founder of Humane Intelligence, a nonprofit specializing in AI red-teaming and accountability audits. Former Responsible AI lead at Twitter. Her participatory approach to AI auditing — involving impacted communities — is reshaping how bias and safety are evaluated. Co-organizes DEF CON's annual AI Red Team events.",
  dragos:      "MEP and lead rapporteur who shepherded the EU AI Act through the European Parliament — the world's first comprehensive binding AI regulation. The Act, adopted in 2024, creates a risk-tiered framework requiring transparency, safety testing, and fundamental rights impact assessments for high-risk AI systems deployed across EU member states.",
  vestager:    "As EU Executive Vice President for A Europe Fit for the Digital Age, Vestager led Europe's landmark digital policy agenda — including the AI Act, Digital Markets Act, and Digital Services Act. Her competition enforcement against major tech platforms shaped how AI market power is regulated globally. Called the 'Most Powerful Woman in Tech' by Politico.",
  alondra:     "Sociologist and deputy director of the White House Office of Science and Technology Policy under President Biden. Led the development of the AI Bill of Rights — a landmark blueprint for protecting civil rights in an AI age. Her work integrates critical race theory, sociology of science, and government policy to center equity in AI governance.",
  henna:       "Finnish MEP who became EU Commissioner for Tech Sovereignty, Security, and Democracy in 2024, with oversight of the EU AI Office implementing the AI Act. Has emphasized cybersecurity and digital sovereignty alongside AI governance. Represents the new generation of EU policymakers who view AI regulation as inseparable from geopolitical security.",
  yizeng:      "Senior researcher at the Chinese Academy of Sciences and a principal architect of China's AI ethics guidelines. Co-drafted China's first AI principles document and represents China in international AI ethics bodies. His work bridges Confucian values and global AI ethics discourse, arguing for culturally situated governance frameworks that respect diverse societal contexts.",
  schneier:    "Renowned security technologist and fellow at Harvard's Berkman Klein Center. Has written extensively on AI and power, arguing that AI exacerbates existing security and societal power imbalances. His books and essays are required reading in security policy circles. Advocates for strong democratic oversight of AI and opposes technosolutionism in government.",

  // Additional Researchers & Industry
  barto:       "Professor at UMass Amherst and co-developer (with Richard Sutton) of the temporal difference learning algorithm and the modern formulation of reinforcement learning in their landmark textbook. RL became the foundation of AlphaGo, ChatGPT's RLHF fine-tuning, and robotics policy learning. Their open textbook is the definitive RL reference.",
  vapnik:      "Invented Support Vector Machines (SVMs) at Bell Labs in the 1990s — the dominant machine learning algorithm before deep learning. SVMs provided mathematically rigorous classification with strong generalization guarantees via the structural risk minimization principle. Also co-developed VC theory — the statistical learning theory explaining why ML models generalize.",
  askell:      "Research scientist at Anthropic working on Claude's values, character, and harmlessness. Co-authored the original Constitutional AI paper and works on how to make AI systems that are genuinely helpful, honest, and harmless. Brings a background in philosophy of mind to questions of how AI systems should reason about ethics and uncertainty.",
  hubinger:    "Research scientist at Anthropic focused on the alignment problem of deceptive alignment — AI systems that behave safely during training but pursue misaligned goals in deployment. Author of 'Risks from Learned Optimization' and an influential researcher in AI safety theory. His work on model organisms of misalignment tests dangerous capabilities in controlled settings.",
  sara_hooker: "Director of Cohere for AI, a nonprofit research lab. Pioneered research on model compression, efficient training, and what is lost when models are pruned or quantized. Her work on 'The Lottery Ticket Hypothesis' and hardware-aware ML research bridges systems efficiency and fundamental model understanding, with a focus on making ML research more accessible globally.",
  clement:     "Co-founder and CEO of Hugging Face, the open-source AI platform that has become the GitHub of machine learning. Built the Transformers library and Hugging Face Hub, giving millions of developers access to pre-trained models. His vision of democratizing AI through open-source collaboration has made Hugging Face foundational infrastructure for the global ML community.",
  awang:       "Founded Scale AI at 19, building the data labeling infrastructure that powers AI training at OpenAI, Google, Meta, and the US Department of Defense. Scale AI's work on RLHF data collection has directly shaped how modern LLMs are trained. Advocates for US AI leadership through investment in data infrastructure and government AI adoption.",
  emad:        "Founder of Stability AI and the force behind Stable Diffusion — the open-source image generation model that democratized generative art. By releasing model weights publicly, Stability AI catalyzed an explosion of creative tools and research. Later left Stability AI amid controversy. A polarizing figure who champions open-source AI against closed corporate models.",
  amensch:     "Co-founder and CEO of Mistral AI, the French AI startup challenging US LLM dominance with high-performance open-weight models. Mistral's models (Mistral 7B, Mixtral MoE) punch above their weight class and are widely adopted in Europe. Represents Europe's push for technological sovereignty in AI alongside regulatory leadership.",
  chollet:     "Creator of the Keras deep learning library, making neural network research accessible to millions. Invented the ARC (Abstraction and Reasoning Corpus) benchmark — designed to measure general fluid intelligence in AI, not just pattern memorization. His open critique of AI hype and advocacy for genuine reasoning benchmarks has influenced how the field measures real progress.",
};

function computeEdges(people) {
  const out = [];
  for (let i = 0; i < people.length; i++) {
    for (let j = i + 1; j < people.length; j++) {
      const a = people[i], b = people[j];
      const shared = a.topics.filter(t => b.topics.includes(t));
      if (shared.length > 0) {
        out.push({ source: a.id, target: b.id, topics: shared, weight: shared.length });
      }
    }
  }
  return out;
}

const allEdges = computeEdges(PEOPLE);
const nodeById = Object.fromEntries(PEOPLE.map(p => [p.id, p]));

const topicMembers = {};
TOPICS.forEach(t => { topicMembers[t.id] = new Set(); });
PEOPLE.forEach(p => p.topics.forEach(tid => {
  if (topicMembers[tid]) topicMembers[tid].add(p.id);
}));

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

// Domain legend
const domLegend = document.getElementById("domain-legend");
Object.entries(DOMAINS).forEach(([domId, dom]) => {
  const count = PEOPLE.filter(p => p.domain === domId).length;
  const item = el("div", "domain-item");
  const dot = el("span", "domain-dot");
  dot.style.background = dom.color;
  dot.style.boxShadow = "0 0 6px " + dom.color;
  const label = el("span", null, dom.label);
  const cnt = el("span", "domain-count", String(count));
  item.append(dot, label, cnt);
  domLegend.appendChild(item);
});

// Topic filter chips
const topicFiltersEl = document.getElementById("topic-filters");
TOPICS.forEach(topic => {
  const count = topicMembers[topic.id].size;
  const chip = el("div", "topic-chip");
  chip.dataset.topicId = topic.id;
  chip.style.setProperty("--tc-bg",     "rgba(" + topic.rgb.join(",") + ",0.15)");
  chip.style.setProperty("--tc-border", "rgba(" + topic.rgb.join(",") + ",0.5)");
  chip.style.setProperty("--tc-color",  topic.color);
  const dot = el("span", "topic-dot");
  dot.style.background = topic.color;
  const label = el("span", null, topic.label);
  const cnt = el("span", "topic-count", String(count));
  chip.append(dot, label, cnt);
  chip.addEventListener("click", () => toggleTopic(topic.id));
  topicFiltersEl.appendChild(chip);
});

document.getElementById("clear-topics").addEventListener("click", () => {
  activeTopics.clear();
  updateTopicChips();
  renderLinks();
  updateBadge();
});

function toggleTopic(id) {
  activeTopics.has(id) ? activeTopics.delete(id) : activeTopics.add(id);
  updateTopicChips();
  renderLinks();
  updateBadge();
}

function updateTopicChips() {
  document.querySelectorAll(".topic-chip").forEach(chip => {
    chip.classList.toggle("active", activeTopics.has(chip.dataset.topicId));
  });
}

const zoomRoot = svg.select("#zoom-root");
const linksLayer = svg.select("#links-layer");
const nodesLayer = svg.select("#nodes-layer");

const CLUSTER = {
  historical: [0.15, 0.45],
  research:   [0.32, 0.42],
  industry:   [0.63, 0.37],
  safety:     [0.44, 0.20],
  ethics:     [0.24, 0.68],
  policy:     [0.68, 0.65],
};

let W = 800, H = 600;
function getDims() {
  const c = document.getElementById("graph-container");
  return [c.clientWidth, c.clientHeight];
}
[W, H] = getDims();

const radiusOf = d => 6 + (d.size - 5) * 2;  // maps size 5-10 → 6-16

// Scatter nodes near their cluster centroid for initial positions
PEOPLE.forEach(p => {
  const pos = CLUSTER[p.domain] || [0.5, 0.5];
  p.x = pos[0] * W + (Math.random() - 0.5) * 100;
  p.y = pos[1] * H + (Math.random() - 0.5) * 100;
  p.vx = 0; p.vy = 0;
});

function clusterForce(strength) {
  return () => {
    PEOPLE.forEach(p => {
      const pos = CLUSTER[p.domain] || [0.5, 0.5];
      const cx = pos[0] * W, cy = pos[1] * H;
      p.vx += (cx - p.x) * strength;
      p.vy += (cy - p.y) * strength;
    });
  };
}

const simulation = d3.forceSimulation(PEOPLE)
  .force("charge", d3.forceManyBody().strength(d => -180 - d.size * 15))
  .force("center",  d3.forceCenter(W / 2, H / 2).strength(0.03))
  .force("collide", d3.forceCollide(d => radiusOf(d) + 14).strength(0.7))
  .force("cluster", clusterForce(0.03))
  .on("tick", ticked);

// ═══════════════════════════════════════
//  NODE RENDERING
// ═══════════════════════════════════════

const nodeGroups = nodesLayer.selectAll(".node")
  .data(PEOPLE, d => d.id)
  .enter()
  .append("g")
  .attr("class", "node")
  .call(
    d3.drag()
      .on("start", (ev, d) => { if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on("end",   (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  )
  .on("mouseover", onNodeHover)
  .on("mouseout",  onNodeOut)
  .on("click",     onNodeClick);

// Glow ring
nodeGroups.append("circle")
  .attr("r", d => radiusOf(d) + 5)
  .attr("fill", "none")
  .attr("stroke", d => DOMAINS[d.domain].color)
  .attr("stroke-width", 1)
  .attr("stroke-opacity", 0.2)
  .attr("class", "glow-ring");

// Main circle
nodeGroups.append("circle")
  .attr("r", d => radiusOf(d))
  .attr("fill", d => DOMAINS[d.domain].color)
  .attr("fill-opacity", 0.82)
  .attr("stroke", d => d3.color(DOMAINS[d.domain].color).brighter(0.6).toString())
  .attr("stroke-width", 1.2)
  .attr("class", "main-circle");

// Last-name label for every figure
nodeGroups.each(function(d) {
  const lastName = d.name.split(" ").pop();
  d3.select(this).append("text")
    .attr("class", "node-label")
    .attr("y", radiusOf(d) + 11)
    .text(lastName);
});

function ticked() {
  nodeGroups.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
  renderLinks();
}

// ═══════════════════════════════════════
//  LINK RENDERING
// ═══════════════════════════════════════

function renderLinks() {
  linksLayer.selectAll("*").remove();
  // Priority: hovered > selected > active topics
  const focusNode = hoveredNode || selectedNode;
  if (activeTopics.size === 0 && !focusNode) return;

  let edges;
  let isNodeFocus = false;
  if (focusNode) {
    edges = allEdges.filter(e => e.source === focusNode.id || e.target === focusNode.id);
    isNodeFocus = true;
  } else {
    edges = allEdges.filter(e => e.topics.some(t => activeTopics.has(t)));
  }

  edges.forEach(e => {
    const sa = nodeById[e.source];
    const ta = nodeById[e.target];
    if (!sa || !ta) return;
    if (searchQuery) {
      const aMatch = sa.name.toLowerCase().includes(searchQuery);
      const bMatch = ta.name.toLowerCase().includes(searchQuery);
      if (!aMatch && !bMatch) return;
    }
    const pickTopic = e.topics.find(t => activeTopics.has(t)) || e.topics[0];
    const ti = topicById[pickTopic] || { color: "#888" };
    linksLayer.append("line")
      .attr("class", "link")
      .attr("x1", sa.x).attr("y1", sa.y)
      .attr("x2", ta.x).attr("y2", ta.y)
      .attr("stroke", ti.color)
      .attr("stroke-width", 0.7 + e.weight * 0.35)
      .attr("stroke-opacity", isNodeFocus ? (hoveredNode ? 0.72 : 0.55) : 0.40);
  });
}

// ═══════════════════════════════════════
//  TOOLTIP + INFO PANEL — safe DOM methods
// ═══════════════════════════════════════

const tooltipEl  = document.getElementById("tooltip");
const infoPanel  = document.getElementById("info-panel");
const ipAccent   = document.getElementById("ip-accent");
const ipName     = document.getElementById("ip-name");
const ipRole     = document.getElementById("ip-role");
const ipOrg      = document.getElementById("ip-org");
const ipBio      = document.getElementById("ip-bio");

function buildTooltip(d) {
  while (tooltipEl.firstChild) tooltipEl.removeChild(tooltipEl.firstChild);

  const name = el("div", "tt-name", d.name);
  const role = el("div", "tt-role", d.role);
  const org  = el("div", "tt-org",  d.org);
  const tags = el("div", "tt-topics");

  d.topics.forEach(tid => {
    const t = topicById[tid];
    if (!t) return;
    const tag = el("span", "tt-tag", t.label);
    tag.style.background  = "rgba(" + t.rgb.join(",") + ",0.2)";
    tag.style.borderColor = "rgba(" + t.rgb.join(",") + ",0.4)";
    tag.style.color       = t.color;
    tags.appendChild(tag);
  });

  tooltipEl.append(name, role, org, tags);
}

function buildInfoPanel(d) {
  const domColor = DOMAINS[d.domain] ? DOMAINS[d.domain].color : "#60a5fa";
  ipAccent.style.background = domColor;
  ipName.textContent = d.name;
  ipRole.textContent = d.role;
  ipOrg.textContent  = d.org;
  ipBio.textContent  = BIOS[d.id] || "";
}

function onNodeHover(event, d) {
  hoveredNode = d;
  renderLinks();
  d3.select(this).select(".main-circle")
    .transition().duration(100)
    .attr("r", radiusOf(d) * 1.35).attr("fill-opacity", 1);
  d3.select(this).select(".glow-ring")
    .transition().duration(100)
    .attr("stroke-opacity", 0.55).attr("r", radiusOf(d) + 12);
  buildTooltip(d);
  tooltipEl.classList.add("visible");
  buildInfoPanel(d);
  infoPanel.classList.add("visible");
}

function onNodeOut(event, d) {
  hoveredNode = null;
  renderLinks();

  // Determine target visual state based on selection
  const isSelected = selectedNode && selectedNode.id === d.id;
  const isNeighbor = selectedNode && !isSelected && getNeighborIds(selectedNode.id).has(d.id);

  d3.select(this).select(".main-circle")
    .transition().duration(200)
    .attr("r", isSelected ? radiusOf(d) * 1.3 : radiusOf(d))
    .attr("fill-opacity", isSelected ? 1 : (isNeighbor ? 0.85 : (selectedNode ? 0.10 : getOpacity(d))));
  d3.select(this).select(".glow-ring")
    .transition().duration(200)
    .attr("stroke-opacity", isSelected ? 0.6 : (isNeighbor ? 0.3 : (selectedNode ? 0.04 : 0.2)))
    .attr("r", isSelected ? radiusOf(d) + 11 : radiusOf(d) + 5);

  tooltipEl.classList.remove("visible");
  infoPanel.classList.remove("visible");
}

function getOpacity(d) {
  if (!searchQuery) return 0.82;
  return d.name.toLowerCase().includes(searchQuery) ? 0.95 : 0.12;
}

// ═══════════════════════════════════════
//  NODE CLICK — select / deselect
// ═══════════════════════════════════════

function onNodeClick(event, d) {
  event.stopPropagation();
  if (selectedNode && selectedNode.id === d.id) {
    clearNodeSelection();
  } else {
    setSelectedNode(d);
    // Scroll the matching people-panel item into view
    const item = document.querySelector(`#pp-list [data-pid="${d.id}"]`);
    if (item) item.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

function getNeighborIds(nodeId) {
  const ids = new Set([nodeId]);
  allEdges.forEach(e => {
    if (e.source === nodeId) ids.add(e.target);
    if (e.target === nodeId) ids.add(e.source);
  });
  return ids;
}

function setSelectedNode(d) {
  selectedNode = d;
  renderLinks();
  applySelectionHighlight();
  updatePeoplePanel();
  showResearchPanel(d);
}

function clearNodeSelection() {
  selectedNode = null;
  infoPanel.classList.remove("visible");
  document.getElementById("research-panel").classList.remove("visible");
  renderLinks();
  applySelectionHighlight();
  updatePeoplePanel();
}

/** Dim/brighten nodes according to the current selectedNode state. */
function applySelectionHighlight() {
  if (!selectedNode) {
    nodeGroups.select(".main-circle")
      .transition().duration(220)
      .attr("r", d => radiusOf(d))
      .attr("fill-opacity", d => getOpacity(d));
    nodeGroups.select(".glow-ring")
      .transition().duration(220)
      .attr("stroke-opacity", 0.2)
      .attr("r", d => radiusOf(d) + 5);
    return;
  }

  const related = getNeighborIds(selectedNode.id);
  nodeGroups.select(".main-circle")
    .transition().duration(220)
    .attr("r", d => d.id === selectedNode.id ? radiusOf(d) * 1.3 : radiusOf(d))
    .attr("fill-opacity", d =>
      d.id === selectedNode.id ? 1 : (related.has(d.id) ? 0.85 : 0.10));
  nodeGroups.select(".glow-ring")
    .transition().duration(220)
    .attr("stroke-opacity", d =>
      d.id === selectedNode.id ? 0.6 : (related.has(d.id) ? 0.3 : 0.04))
    .attr("r", d => d.id === selectedNode.id ? radiusOf(d) + 11 : radiusOf(d) + 5);
}

// ═══════════════════════════════════════
//  PEOPLE PANEL
// ═══════════════════════════════════════

const ppList  = document.getElementById("pp-list");
const ppCount = document.getElementById("pp-count");
const ppClear = document.getElementById("pp-clear");

// Sort alphabetically by last name
const sortedPeople = [...PEOPLE].sort((a, b) => {
  const la = a.name.split(" ").pop(), lb = b.name.split(" ").pop();
  return la.localeCompare(lb);
});

sortedPeople.forEach(person => {
  const item = el("div", "pp-item");
  item.dataset.pid = person.id;
  const dot = el("span", "pp-dot");
  dot.style.background = DOMAINS[person.domain].color;
  const name = el("span", null, person.name);
  item.append(dot, name);
  item.addEventListener("click", () => onPeopleItemClick(person));
  ppList.appendChild(item);
});

ppCount.textContent = PEOPLE.length;

ppClear.addEventListener("click", () => clearNodeSelection());

function onPeopleItemClick(person) {
  const d = nodeById[person.id];
  if (!d) return;
  if (selectedNode && selectedNode.id === d.id) {
    clearNodeSelection();
    return;
  }
  setSelectedNode(d);
  // Fly the graph to center the selected node
  const [cw, ch] = getDims();
  const scale = 2.2;
  svg.transition().duration(650)
    .call(zoomBehavior.transform,
      d3.zoomIdentity.translate(cw / 2 - d.x * scale, ch / 2 - d.y * scale).scale(scale));
}

function updatePeoplePanel() {
  const items = ppList.querySelectorAll(".pp-item");

  if (!selectedNode) {
    items.forEach(item => {
      item.style.display = "";
      item.classList.remove("pp-selected", "pp-neighbor");
    });
    ppCount.textContent = PEOPLE.length;
    ppClear.style.display = "none";
    return;
  }

  const related = getNeighborIds(selectedNode.id);
  let count = 0;

  items.forEach(item => {
    const pid = item.dataset.pid;
    if (related.has(pid)) {
      item.style.display = "";
      item.classList.toggle("pp-selected", pid === selectedNode.id);
      item.classList.toggle("pp-neighbor", pid !== selectedNode.id);
      count++;
    } else {
      item.style.display = "none";
      item.classList.remove("pp-selected", "pp-neighbor");
    }
  });

  ppCount.textContent = count;
  ppClear.style.display = "";
}

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════

document.getElementById("search").addEventListener("input", function() {
  searchQuery = this.value.toLowerCase().trim();
  nodeGroups.select(".main-circle").attr("fill-opacity", d => getOpacity(d));
  nodeGroups.select(".glow-ring").attr("stroke-opacity", d =>
    searchQuery ? (d.name.toLowerCase().includes(searchQuery) ? 0.65 : 0.04) : 0.2
  );
  renderLinks();
});

// ═══════════════════════════════════════
//  CONNECTION BADGE — safe DOM
// ═══════════════════════════════════════

function updateBadge() {
  const badge = document.getElementById("conn-badge");
  if (activeTopics.size === 0) { badge.style.opacity = "0"; return; }
  const count = allEdges.filter(e => e.topics.some(t => activeTopics.has(t))).length;
  const labels = [...activeTopics].map(t => topicById[t]?.label || t).join(" · ");
  badge.textContent = count + " connections  —  " + labels;
  badge.style.opacity = "1";
}

// ═══════════════════════════════════════
//  ZOOM & PAN
// ═══════════════════════════════════════

zoomBehavior = d3.zoom()
  .scaleExtent([0.25, 5])
  .on("zoom", ev => zoomRoot.attr("transform", ev.transform));

svg.call(zoomBehavior);
document.getElementById("zoom-in").addEventListener("click",    () => svg.transition().call(zoomBehavior.scaleBy, 1.4));
document.getElementById("zoom-out").addEventListener("click",   () => svg.transition().call(zoomBehavior.scaleBy, 0.7));
document.getElementById("zoom-reset").addEventListener("click", () => svg.transition().call(zoomBehavior.transform, d3.zoomIdentity));

// Click on the SVG background to deselect
svg.on("click.deselect", (event) => {
  if (event.target.closest(".node")) return; // bubble hit a node — ignore
  if (selectedNode) clearNodeSelection();
});

// ═══════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════

window.addEventListener("resize", () => {
  [W, H] = getDims();
  simulation.force("center", d3.forceCenter(W / 2, H / 2).strength(0.03));
  simulation.alpha(0.25).restart();
});

// ═══════════════════════════════════════
//  RESEARCH PANEL
// ═══════════════════════════════════════

function showResearchPanel(d) {
  const panel   = document.getElementById("research-panel");
  const content = document.getElementById("rp-content");
  const nameEl  = document.getElementById("rp-name");
  const roleEl  = document.getElementById("rp-role-org");
  const accent  = document.getElementById("rp-accent");

  const domColor = DOMAINS[d.domain] ? DOMAINS[d.domain].color : "#60a5fa";
  accent.style.background = domColor;
  nameEl.textContent = d.name;
  nameEl.style.color = domColor;
  roleEl.textContent = d.role + (d.org ? "  ·  " + d.org : "");

  let mdText = (typeof RESEARCH !== "undefined" && RESEARCH[d.id])
    ? RESEARCH[d.id]
    : "## " + d.name + "\n\nResearch profile not available — make sure research-data.js is in the same folder as this HTML file.";

  // Strip "Catholics in Tech Podcast" subtitle line
  mdText = mdText.replace(/^###\s*Catholics in Tech Podcast\s*\n?/m, "");

  // Collect ## section headings for TOC
  const headings = [];
  mdText.split("\n").forEach(line => {
    const m = line.match(/^## (.+)$/);
    if (m) headings.push(m[1].trim());
  });

  // Render markdown
  content.innerHTML = (typeof marked !== "undefined")
    ? marked.parse(mdText)
    : "<pre style='white-space:pre-wrap;font-size:12px'>" + mdText.replace(/</g, "&lt;") + "</pre>";

  // Stamp IDs onto h2 elements so TOC links can target them
  content.querySelectorAll("h2").forEach((h2, i) => { h2.id = "rp-s" + i; });

  // Build TOC and prepend to content
  if (headings.length > 0) {
    const toc = document.createElement("div");
    toc.className = "rp-toc";
    const title = document.createElement("div");
    title.className = "rp-toc-title";
    title.textContent = "Contents";
    toc.appendChild(title);
    headings.forEach((heading, i) => {
      const a = document.createElement("a");
      a.href = "#rp-s" + i;
      a.textContent = heading;
      a.addEventListener("click", e => {
        e.preventDefault();
        const target = content.querySelector("#rp-s" + i);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
      });
      toc.appendChild(a);
    });
    content.insertBefore(toc, content.firstChild);
  }

  if (typeof SUMMARIES !== "undefined" && SUMMARIES[d.id]) {
    const sumDiv = document.createElement("div");
    sumDiv.className = "rp-summary";
    sumDiv.textContent = SUMMARIES[d.id];
    const ref = headings.length > 0 ? content.children[1] : content.firstChild;
    content.insertBefore(sumDiv, ref || null);
  }

  content.scrollTop = 0;
  panel.classList.add("visible");
}

document.getElementById("rp-close").addEventListener("click", () => {
  clearNodeSelection();
});

</script>
</body>
</html>
