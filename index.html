<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Figures Network — Connected by Topics</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #070b14;
  color: #e2e8f0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

header {
  padding: 10px 20px;
  background: #0d1117;
  border-bottom: 1px solid #1f2937;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  z-index: 10;
}

header h1 {
  font-size: 17px;
  font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

#search {
  background: #161d2a;
  border: 1px solid #2d3748;
  border-radius: 8px;
  padding: 5px 12px;
  color: #e2e8f0;
  font-size: 13px;
  width: 200px;
  outline: none;
  transition: border-color 0.2s;
}
#search::placeholder { color: #4b5563; }
#search:focus { border-color: #4361ee; }

.header-hint { font-size: 11px; color: #374151; white-space: nowrap; }
.header-stats { margin-left: auto; font-size: 11px; color: #4b5563; white-space: nowrap; }

.main { display: flex; flex: 1; overflow: hidden; }

#sidebar {
  width: 230px;
  background: #0d1117;
  border-right: 1px solid #1a2234;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 14px 12px;
  scrollbar-width: thin;
  scrollbar-color: #1f2937 transparent;
}

.sidebar-section { margin-bottom: 18px; }
.sidebar-section h3 {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #4b5563;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #1a2234;
}

.domain-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 12px;
  cursor: default;
}

.domain-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.domain-count { margin-left: auto; font-size: 10px; color: #4b5563; }
.topics-grid { display: flex; flex-direction: column; gap: 3px; }

.topic-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 8px;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid #1a2234;
  transition: all 0.2s;
  background: #0d1117;
  color: #6b7280;
  user-select: none;
}
.topic-chip:hover { border-color: #2d3748; color: #9ca3af; background: #161d2a; }
.topic-chip.active { background: var(--tc-bg); border-color: var(--tc-border); color: var(--tc-color); }

.topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.topic-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

.btn-clear {
  display: block; width: 100%; padding: 5px;
  background: transparent; border: 1px solid #1a2234; border-radius: 6px;
  color: #4b5563; font-size: 11px; cursor: pointer; text-align: center;
  margin-top: 8px; transition: all 0.2s;
}
.btn-clear:hover { border-color: #2d3748; color: #9ca3af; }

#graph-container { flex: 1; position: relative; overflow: hidden; }

svg { width: 100%; height: 100%; }

.node { cursor: pointer; }
.node circle { transition: r 0.15s; }
.node .node-label {
  font-size: 9.5px;
  fill: #e2e8f0;
  stroke: #070b14;
  stroke-width: 2.8px;
  paint-order: stroke fill;
  pointer-events: none;
  text-anchor: middle;
  font-weight: 500;
}
.link { fill: none; pointer-events: none; }

#tooltip {
  position: absolute; bottom: 16px; right: 16px;
  background: #0d1117; border: 1px solid #1f2937; border-radius: 12px;
  padding: 14px 16px; width: 270px; pointer-events: none;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s; z-index: 100;
}
#tooltip.visible { opacity: 1; transform: translateY(0); }
.tt-name { font-size: 15px; font-weight: 700; color: #f9fafb; margin-bottom: 2px; }
.tt-role { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.tt-org { font-size: 12px; color: #60a5fa; margin-bottom: 10px; }
.tt-topics { display: flex; flex-wrap: wrap; gap: 4px; }
.tt-tag { padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 500; border: 1px solid; }

.zoom-controls {
  position: absolute; bottom: 16px; left: 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.zoom-btn {
  width: 28px; height: 28px; background: #0d1117; border: 1px solid #1f2937;
  border-radius: 6px; color: #9ca3af; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.zoom-btn:hover { background: #161d2a; color: #e2e8f0; }

#conn-badge {
  position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
  background: #0d1117; border: 1px solid #1f2937; border-radius: 8px;
  padding: 4px 12px; font-size: 11px; color: #6b7280;
  pointer-events: none; transition: opacity 0.2s; max-width: 480px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

#info-panel {
  position: absolute; top: 12px; right: 12px;
  width: 290px;
  background: #0d1117;
  border: 1px solid #1f2937;
  border-radius: 12px;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 90;
}
#info-panel.visible { opacity: 1; transform: translateY(0); }
#ip-accent { height: 3px; width: 100%; }
#ip-body { padding: 12px 14px 14px; }
#ip-name { font-size: 14px; font-weight: 700; color: #f9fafb; margin-bottom: 2px; }
#ip-role { font-size: 10px; color: #6b7280; margin-bottom: 2px; }
#ip-org  { font-size: 11px; color: #60a5fa; margin-bottom: 10px; }
#ip-bio  {
  font-size: 11.5px; line-height: 1.55; color: #9ca3af;
  max-height: 160px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #1f2937 transparent;
}

/* ── People Panel ── */
#people-panel {
  width: 190px;
  background: #090d16;
  border-right: 1px solid #1a2234;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.pp-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid #1a2234;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.pp-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #4b5563;
}

#pp-count {
  font-size: 10px;
  color: #374151;
  margin-left: auto;
}

#pp-clear {
  background: none;
  border: 1px solid #1a2234;
  color: #4b5563;
  cursor: pointer;
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 4px;
  display: none;
  transition: all 0.15s;
  line-height: 1.4;
}
#pp-clear:hover { border-color: #2d3748; color: #9ca3af; }

#pp-list {
  flex: 1;
  overflow-y: auto;
  padding: 5px 6px;
  scrollbar-width: thin;
  scrollbar-color: #1f2937 transparent;
}

.pp-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 7px;
  border-radius: 6px;
  font-size: 11.5px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  color: #6b7280;
  user-select: none;
  border: 1px solid transparent;
}
.pp-item:hover { background: #161d2a; color: #d1d5db; }

.pp-item.pp-selected {
  background: rgba(96,165,250,0.10);
  border-color: rgba(96,165,250,0.25);
  color: #f9fafb;
  font-weight: 600;
}
.pp-item.pp-neighbor {
  color: #c4cada;
}

.pp-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Research Panel ── */
#research-panel {
  width: 0;
  min-width: 0;
  background: #080d18;
  border-left: 1px solid #1a2234;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              min-width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
#research-panel.visible {
  width: 560px;
  min-width: 560px;
}
.rp-accent-bar {
  height: 3px;
  width: 100%;
  flex-shrink: 0;
}
.rp-header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid #1a2234;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-shrink: 0;
  background: #0d1117;
}
.rp-info { flex: 1; min-width: 0; }
.rp-name {
  font-size: 15px;
  font-weight: 700;
  color: #f9fafb;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rp-role-org {
  font-size: 11px;
  color: #6b7280;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rp-close {
  background: none;
  border: 1px solid #1a2234;
  color: #4b5563;
  cursor: pointer;
  font-size: 13px;
  width: 24px;
  height: 24px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  margin-top: 1px;
}
.rp-close:hover { border-color: #374151; color: #9ca3af; background: #161d2a; }
.rp-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px 40px;
  scrollbar-width: thin;
  scrollbar-color: #1f2937 transparent;
  color: #c4cada;
  font-size: 13.5px;
  line-height: 1.75;
}
.rp-content h1 { display: none; }
.rp-content h2 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #4b5563;
  margin: 28px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #151c2b;
}
.rp-content h3 {
  font-size: 13.5px;
  font-weight: 600;
  color: #9ca3af;
  margin: 16px 0 6px;
}
.rp-content p {
  margin-bottom: 10px;
  color: #c4cada;
}
.rp-content strong { color: #e2e8f0; font-weight: 600; }
.rp-content em { color: #8fa3be; font-style: italic; }
.rp-content ul {
  padding-left: 20px;
  margin-bottom: 10px;
}
.rp-content li { margin-bottom: 4px; }
.rp-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 12.5px;
  table-layout: auto;
}
.rp-content th {
  text-align: left;
  padding: 7px 10px;
  background: #0a0f1a;
  border: 1px solid #1a2234;
  color: #6b7280;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.rp-content td {
  padding: 7px 10px;
  border: 1px solid #1a2234;
  color: #c4cada;
  vertical-align: top;
  word-break: break-word;
}
.rp-content tr:nth-child(even) td { background: rgba(10,15,26,0.5); }
.rp-content blockquote {
  border-left: 3px solid #1e3050;
  padding: 6px 16px;
  color: #7c8fa8;
  margin: 10px 0;
  font-style: italic;
  background: rgba(30,48,80,0.15);
  border-radius: 0 5px 5px 0;
}
.rp-content code {
  background: #161d2a;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
  color: #60a5fa;
  font-family: monospace;
}
.rp-content hr {
  border: none;
  border-top: 1px solid #1a2234;
  margin: 24px 0;
}
.rp-content a { color: #60a5fa; text-decoration: none; }
.rp-content a:hover { text-decoration: underline; }

.rp-toc {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 12px 14px 14px;
  background: #0a0f1a;
  border: 1px solid #1a2234;
  border-radius: 8px;
  margin-bottom: 22px;
}
.rp-toc-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: #374151;
  margin-bottom: 8px;
}
.rp-toc a {
  font-size: 12px;
  color: #5a6a80;
  text-decoration: none !important;
  padding: 3px 8px;
  border-radius: 5px;
  border: 1px solid transparent;
  transition: all 0.15s;
  display: block;
}
.rp-toc a:hover {
  color: #c4cada;
  background: #161d2a;
  border-color: #1a2234;
}

.rp-summary {
  font-size: 13px;
  line-height: 1.7;
  color: #8fa3be;
  padding: 13px 16px;
  background: rgba(20, 35, 60, 0.35);
  border-left: 3px solid #1e3555;
  border-radius: 0 6px 6px 0;
  margin-bottom: 22px;
}
</style>
</head>
<body>

<header>
  <h1>★ AI Figures Network</h1>
  <input type="text" id="search" placeholder="Search people…">
  <span class="header-hint">Hover a node · Click topics to reveal connections</span>
  <div class="header-stats" id="header-stats">114 people · 25 topics</div>
</header>

<div class="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <h3>Domains</h3>
      <div id="domain-legend"></div>
    </div>
    <div class="sidebar-section">
      <h3>Topics — Click to Connect</h3>
      <div class="topics-grid" id="topic-filters"></div>
      <button class="btn-clear" id="clear-topics">Clear All Topics</button>
    </div>
  </div>

  <div id="people-panel">
    <div class="pp-header">
      <span class="pp-title">Figures</span>
      <span id="pp-count"></span>
      <button id="pp-clear" title="Show all">Clear</button>
    </div>
    <div id="pp-list"></div>
  </div>

  <div id="graph-container">
    <svg id="graph">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="zoom-root">
        <g id="links-layer"></g>
        <g id="nodes-layer"></g>
      </g>
    </svg>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">&#8722;</button>
      <button class="zoom-btn" id="zoom-reset" style="font-size:12px">&#8962;</button>
    </div>
    <div id="conn-badge" style="opacity:0"></div>
    <div id="info-panel">
      <div id="ip-accent"></div>
      <div id="ip-body">
        <div id="ip-name"></div>
        <div id="ip-role"></div>
        <div id="ip-org"></div>
        <div id="ip-bio"></div>
      </div>
    </div>
  </div>

  <div id="research-panel">
    <div class="rp-accent-bar" id="rp-accent"></div>
    <div class="rp-header">
      <div class="rp-info">
        <div class="rp-name" id="rp-name">Research Profile</div>
        <div class="rp-role-org" id="rp-role-org"></div>
      </div>
      <button class="rp-close" id="rp-close" title="Close">&#10005;</button>
    </div>
    <div class="rp-content" id="rp-content"></div>
  </div>
</div>

<div id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="data/figures-data.js"></script>
<script src="data/research-data.js"></script>
<script src="data/summaries-data.js"></script>
<script>
// ═══════════════════════════════════════
//  STATIC DATA
// ═══════════════════════════════════════

const topicById = Object.fromEntries(TOPICS.map(t => [t.id, t]));

// ═══════════════════════════════════════
//  EDGE COMPUTATION
// ═══════════════════════════════════════

function computeEdges(people) {
  const out = [];
  for (let i = 0; i < people.length; i++) {
    for (let j = i + 1; j < people.length; j++) {
      const a = people[i], b = people[j];
      const shared = a.topics.filter(t => b.topics.includes(t));
      if (shared.length > 0) {
        out.push({ source: a.id, target: b.id, topics: shared, weight: shared.length });
      }
    }
  }
  return out;
}

const allEdges = computeEdges(PEOPLE);
const nodeById = Object.fromEntries(PEOPLE.map(p => [p.id, p]));

const topicMembers = {};
TOPICS.forEach(t => { topicMembers[t.id] = new Set(); });
PEOPLE.forEach(p => p.topics.forEach(tid => {
  if (topicMembers[tid]) topicMembers[tid].add(p.id);
}));

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════

let activeTopics = new Set();
let hoveredNode = null;
let selectedNode = null;
let searchQuery = "";
let zoomBehavior;

// ═══════════════════════════════════════
//  BUILD SIDEBAR — safe DOM methods
// ═══════════════════════════════════════

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

// Domain legend
const domLegend = document.getElementById("domain-legend");
Object.entries(DOMAINS).forEach(([domId, dom]) => {
  const count = PEOPLE.filter(p => p.domain === domId).length;
  const item = el("div", "domain-item");
  const dot = el("span", "domain-dot");
  dot.style.background = dom.color;
  dot.style.boxShadow = "0 0 6px " + dom.color;
  const label = el("span", null, dom.label);
  const cnt = el("span", "domain-count", String(count));
  item.append(dot, label, cnt);
  domLegend.appendChild(item);
});

// Topic filter chips
const topicFiltersEl = document.getElementById("topic-filters");
TOPICS.forEach(topic => {
  const count = topicMembers[topic.id].size;
  const chip = el("div", "topic-chip");
  chip.dataset.topicId = topic.id;
  chip.style.setProperty("--tc-bg",     "rgba(" + topic.rgb.join(",") + ",0.15)");
  chip.style.setProperty("--tc-border", "rgba(" + topic.rgb.join(",") + ",0.5)");
  chip.style.setProperty("--tc-color",  topic.color);
  const dot = el("span", "topic-dot");
  dot.style.background = topic.color;
  const label = el("span", null, topic.label);
  const cnt = el("span", "topic-count", String(count));
  chip.append(dot, label, cnt);
  chip.addEventListener("click", () => toggleTopic(topic.id));
  topicFiltersEl.appendChild(chip);
});

document.getElementById("clear-topics").addEventListener("click", () => {
  activeTopics.clear();
  updateTopicChips();
  renderLinks();
  updateBadge();
});

function toggleTopic(id) {
  activeTopics.has(id) ? activeTopics.delete(id) : activeTopics.add(id);
  updateTopicChips();
  renderLinks();
  updateBadge();
}

function updateTopicChips() {
  document.querySelectorAll(".topic-chip").forEach(chip => {
    chip.classList.toggle("active", activeTopics.has(chip.dataset.topicId));
  });
}

// ═══════════════════════════════════════
//  D3 SIMULATION
// ═══════════════════════════════════════

const svg = d3.select("#graph");
const zoomRoot = svg.select("#zoom-root");
const linksLayer = svg.select("#links-layer");
const nodesLayer = svg.select("#nodes-layer");

const CLUSTER = {
  historical: [0.15, 0.45],
  research:   [0.32, 0.42],
  industry:   [0.63, 0.37],
  safety:     [0.44, 0.20],
  ethics:     [0.24, 0.68],
  policy:     [0.68, 0.65],
};

let W = 800, H = 600;
function getDims() {
  const c = document.getElementById("graph-container");
  return [c.clientWidth, c.clientHeight];
}
[W, H] = getDims();

const radiusOf = d => 6 + (d.size - 5) * 2;  // maps size 5-10 → 6-16

// Scatter nodes near their cluster centroid for initial positions
PEOPLE.forEach(p => {
  const pos = CLUSTER[p.domain] || [0.5, 0.5];
  p.x = pos[0] * W + (Math.random() - 0.5) * 100;
  p.y = pos[1] * H + (Math.random() - 0.5) * 100;
  p.vx = 0; p.vy = 0;
});

function clusterForce(strength) {
  return () => {
    PEOPLE.forEach(p => {
      const pos = CLUSTER[p.domain] || [0.5, 0.5];
      const cx = pos[0] * W, cy = pos[1] * H;
      p.vx += (cx - p.x) * strength;
      p.vy += (cy - p.y) * strength;
    });
  };
}

const simulation = d3.forceSimulation(PEOPLE)
  .force("charge", d3.forceManyBody().strength(d => -180 - d.size * 15))
  .force("center",  d3.forceCenter(W / 2, H / 2).strength(0.03))
  .force("collide", d3.forceCollide(d => radiusOf(d) + 14).strength(0.7))
  .force("cluster", clusterForce(0.03))
  .on("tick", ticked);

// ═══════════════════════════════════════
//  NODE RENDERING
// ═══════════════════════════════════════

const nodeGroups = nodesLayer.selectAll(".node")
  .data(PEOPLE, d => d.id)
  .enter()
  .append("g")
  .attr("class", "node")
  .call(
    d3.drag()
      .on("start", (ev, d) => { if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on("end",   (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  )
  .on("mouseover", onNodeHover)
  .on("mouseout",  onNodeOut)
  .on("click",     onNodeClick);

// Glow ring
nodeGroups.append("circle")
  .attr("r", d => radiusOf(d) + 5)
  .attr("fill", "none")
  .attr("stroke", d => DOMAINS[d.domain].color)
  .attr("stroke-width", 1)
  .attr("stroke-opacity", 0.2)
  .attr("class", "glow-ring");

// Main circle
nodeGroups.append("circle")
  .attr("r", d => radiusOf(d))
  .attr("fill", d => DOMAINS[d.domain].color)
  .attr("fill-opacity", 0.82)
  .attr("stroke", d => d3.color(DOMAINS[d.domain].color).brighter(0.6).toString())
  .attr("stroke-width", 1.2)
  .attr("class", "main-circle");

// Last-name label for every figure
nodeGroups.each(function(d) {
  const lastName = d.name.split(" ").pop();
  d3.select(this).append("text")
    .attr("class", "node-label")
    .attr("y", radiusOf(d) + 11)
    .text(lastName);
});

function ticked() {
  nodeGroups.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
  renderLinks();
}

// ═══════════════════════════════════════
//  LINK RENDERING
// ═══════════════════════════════════════

function renderLinks() {
  linksLayer.selectAll("*").remove();
  // Priority: hovered > selected > active topics
  const focusNode = hoveredNode || selectedNode;
  if (activeTopics.size === 0 && !focusNode) return;

  let edges;
  let isNodeFocus = false;
  if (focusNode) {
    edges = allEdges.filter(e => e.source === focusNode.id || e.target === focusNode.id);
    isNodeFocus = true;
  } else {
    edges = allEdges.filter(e => e.topics.some(t => activeTopics.has(t)));
  }

  edges.forEach(e => {
    const sa = nodeById[e.source];
    const ta = nodeById[e.target];
    if (!sa || !ta) return;
    if (searchQuery) {
      const aMatch = sa.name.toLowerCase().includes(searchQuery);
      const bMatch = ta.name.toLowerCase().includes(searchQuery);
      if (!aMatch && !bMatch) return;
    }
    const pickTopic = e.topics.find(t => activeTopics.has(t)) || e.topics[0];
    const ti = topicById[pickTopic] || { color: "#888" };
    linksLayer.append("line")
      .attr("class", "link")
      .attr("x1", sa.x).attr("y1", sa.y)
      .attr("x2", ta.x).attr("y2", ta.y)
      .attr("stroke", ti.color)
      .attr("stroke-width", 0.7 + e.weight * 0.35)
      .attr("stroke-opacity", isNodeFocus ? (hoveredNode ? 0.72 : 0.55) : 0.40);
  });
}

// ═══════════════════════════════════════
//  TOOLTIP + INFO PANEL — safe DOM methods
// ═══════════════════════════════════════

const tooltipEl  = document.getElementById("tooltip");
const infoPanel  = document.getElementById("info-panel");
const ipAccent   = document.getElementById("ip-accent");
const ipName     = document.getElementById("ip-name");
const ipRole     = document.getElementById("ip-role");
const ipOrg      = document.getElementById("ip-org");
const ipBio      = document.getElementById("ip-bio");

function buildTooltip(d) {
  while (tooltipEl.firstChild) tooltipEl.removeChild(tooltipEl.firstChild);

  const name = el("div", "tt-name", d.name);
  const role = el("div", "tt-role", d.role);
  const org  = el("div", "tt-org",  d.org);
  const tags = el("div", "tt-topics");

  d.topics.forEach(tid => {
    const t = topicById[tid];
    if (!t) return;
    const tag = el("span", "tt-tag", t.label);
    tag.style.background  = "rgba(" + t.rgb.join(",") + ",0.2)";
    tag.style.borderColor = "rgba(" + t.rgb.join(",") + ",0.4)";
    tag.style.color       = t.color;
    tags.appendChild(tag);
  });

  tooltipEl.append(name, role, org, tags);
}

function buildInfoPanel(d) {
  const domColor = DOMAINS[d.domain] ? DOMAINS[d.domain].color : "#60a5fa";
  ipAccent.style.background = domColor;
  ipName.textContent = d.name;
  ipRole.textContent = d.role;
  ipOrg.textContent  = d.org;
  ipBio.textContent  = BIOS[d.id] || "";
}

function onNodeHover(event, d) {
  hoveredNode = d;
  renderLinks();
  d3.select(this).select(".main-circle")
    .transition().duration(100)
    .attr("r", radiusOf(d) * 1.35).attr("fill-opacity", 1);
  d3.select(this).select(".glow-ring")
    .transition().duration(100)
    .attr("stroke-opacity", 0.55).attr("r", radiusOf(d) + 12);
  buildTooltip(d);
  tooltipEl.classList.add("visible");
  buildInfoPanel(d);
  infoPanel.classList.add("visible");
}

function onNodeOut(event, d) {
  hoveredNode = null;
  renderLinks();

  // Determine target visual state based on selection
  const isSelected = selectedNode && selectedNode.id === d.id;
  const isNeighbor = selectedNode && !isSelected && getNeighborIds(selectedNode.id).has(d.id);

  d3.select(this).select(".main-circle")
    .transition().duration(200)
    .attr("r", isSelected ? radiusOf(d) * 1.3 : radiusOf(d))
    .attr("fill-opacity", isSelected ? 1 : (isNeighbor ? 0.85 : (selectedNode ? 0.10 : getOpacity(d))));
  d3.select(this).select(".glow-ring")
    .transition().duration(200)
    .attr("stroke-opacity", isSelected ? 0.6 : (isNeighbor ? 0.3 : (selectedNode ? 0.04 : 0.2)))
    .attr("r", isSelected ? radiusOf(d) + 11 : radiusOf(d) + 5);

  tooltipEl.classList.remove("visible");
  infoPanel.classList.remove("visible");
}

function getOpacity(d) {
  if (!searchQuery) return 0.82;
  return d.name.toLowerCase().includes(searchQuery) ? 0.95 : 0.12;
}

// ═══════════════════════════════════════
//  NODE CLICK — select / deselect
// ═══════════════════════════════════════

function onNodeClick(event, d) {
  event.stopPropagation();
  if (selectedNode && selectedNode.id === d.id) {
    clearNodeSelection();
  } else {
    setSelectedNode(d);
    // Scroll the matching people-panel item into view
    const item = document.querySelector(`#pp-list [data-pid="${d.id}"]`);
    if (item) item.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

function getNeighborIds(nodeId) {
  const ids = new Set([nodeId]);
  allEdges.forEach(e => {
    if (e.source === nodeId) ids.add(e.target);
    if (e.target === nodeId) ids.add(e.source);
  });
  return ids;
}

function setSelectedNode(d) {
  selectedNode = d;
  renderLinks();
  applySelectionHighlight();
  updatePeoplePanel();
  showResearchPanel(d);
}

function clearNodeSelection() {
  selectedNode = null;
  infoPanel.classList.remove("visible");
  document.getElementById("research-panel").classList.remove("visible");
  renderLinks();
  applySelectionHighlight();
  updatePeoplePanel();
}

/** Dim/brighten nodes according to the current selectedNode state. */
function applySelectionHighlight() {
  if (!selectedNode) {
    nodeGroups.select(".main-circle")
      .transition().duration(220)
      .attr("r", d => radiusOf(d))
      .attr("fill-opacity", d => getOpacity(d));
    nodeGroups.select(".glow-ring")
      .transition().duration(220)
      .attr("stroke-opacity", 0.2)
      .attr("r", d => radiusOf(d) + 5);
    return;
  }

  const related = getNeighborIds(selectedNode.id);
  nodeGroups.select(".main-circle")
    .transition().duration(220)
    .attr("r", d => d.id === selectedNode.id ? radiusOf(d) * 1.3 : radiusOf(d))
    .attr("fill-opacity", d =>
      d.id === selectedNode.id ? 1 : (related.has(d.id) ? 0.85 : 0.10));
  nodeGroups.select(".glow-ring")
    .transition().duration(220)
    .attr("stroke-opacity", d =>
      d.id === selectedNode.id ? 0.6 : (related.has(d.id) ? 0.3 : 0.04))
    .attr("r", d => d.id === selectedNode.id ? radiusOf(d) + 11 : radiusOf(d) + 5);
}

// ═══════════════════════════════════════
//  PEOPLE PANEL
// ═══════════════════════════════════════

const ppList  = document.getElementById("pp-list");
const ppCount = document.getElementById("pp-count");
const ppClear = document.getElementById("pp-clear");

// Sort alphabetically by last name
const sortedPeople = [...PEOPLE].sort((a, b) => {
  const la = a.name.split(" ").pop(), lb = b.name.split(" ").pop();
  return la.localeCompare(lb);
});

sortedPeople.forEach(person => {
  const item = el("div", "pp-item");
  item.dataset.pid = person.id;
  const dot = el("span", "pp-dot");
  dot.style.background = DOMAINS[person.domain].color;
  const name = el("span", null, person.name);
  item.append(dot, name);
  item.addEventListener("click", () => onPeopleItemClick(person));
  ppList.appendChild(item);
});

ppCount.textContent = PEOPLE.length;

ppClear.addEventListener("click", () => clearNodeSelection());

function onPeopleItemClick(person) {
  const d = nodeById[person.id];
  if (!d) return;
  if (selectedNode && selectedNode.id === d.id) {
    clearNodeSelection();
    return;
  }
  setSelectedNode(d);
  // Fly the graph to center the selected node
  const [cw, ch] = getDims();
  const scale = 2.2;
  svg.transition().duration(650)
    .call(zoomBehavior.transform,
      d3.zoomIdentity.translate(cw / 2 - d.x * scale, ch / 2 - d.y * scale).scale(scale));
}

function updatePeoplePanel() {
  const items = ppList.querySelectorAll(".pp-item");

  if (!selectedNode) {
    items.forEach(item => {
      item.style.display = "";
      item.classList.remove("pp-selected", "pp-neighbor");
    });
    ppCount.textContent = PEOPLE.length;
    ppClear.style.display = "none";
    return;
  }

  const related = getNeighborIds(selectedNode.id);
  let count = 0;

  items.forEach(item => {
    const pid = item.dataset.pid;
    if (related.has(pid)) {
      item.style.display = "";
      item.classList.toggle("pp-selected", pid === selectedNode.id);
      item.classList.toggle("pp-neighbor", pid !== selectedNode.id);
      count++;
    } else {
      item.style.display = "none";
      item.classList.remove("pp-selected", "pp-neighbor");
    }
  });

  ppCount.textContent = count;
  ppClear.style.display = "";
}

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════

document.getElementById("search").addEventListener("input", function() {
  searchQuery = this.value.toLowerCase().trim();
  nodeGroups.select(".main-circle").attr("fill-opacity", d => getOpacity(d));
  nodeGroups.select(".glow-ring").attr("stroke-opacity", d =>
    searchQuery ? (d.name.toLowerCase().includes(searchQuery) ? 0.65 : 0.04) : 0.2
  );
  renderLinks();
});

// ═══════════════════════════════════════
//  CONNECTION BADGE — safe DOM
// ═══════════════════════════════════════

function updateBadge() {
  const badge = document.getElementById("conn-badge");
  if (activeTopics.size === 0) { badge.style.opacity = "0"; return; }
  const count = allEdges.filter(e => e.topics.some(t => activeTopics.has(t))).length;
  const labels = [...activeTopics].map(t => topicById[t]?.label || t).join(" · ");
  badge.textContent = count + " connections  —  " + labels;
  badge.style.opacity = "1";
}

// ═══════════════════════════════════════
//  ZOOM & PAN
// ═══════════════════════════════════════

zoomBehavior = d3.zoom()
  .scaleExtent([0.25, 5])
  .on("zoom", ev => zoomRoot.attr("transform", ev.transform));

svg.call(zoomBehavior);
document.getElementById("zoom-in").addEventListener("click",    () => svg.transition().call(zoomBehavior.scaleBy, 1.4));
document.getElementById("zoom-out").addEventListener("click",   () => svg.transition().call(zoomBehavior.scaleBy, 0.7));
document.getElementById("zoom-reset").addEventListener("click", () => svg.transition().call(zoomBehavior.transform, d3.zoomIdentity));

// Click on the SVG background to deselect
svg.on("click.deselect", (event) => {
  if (event.target.closest(".node")) return; // bubble hit a node — ignore
  if (selectedNode) clearNodeSelection();
});

// ═══════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════

window.addEventListener("resize", () => {
  [W, H] = getDims();
  simulation.force("center", d3.forceCenter(W / 2, H / 2).strength(0.03));
  simulation.alpha(0.25).restart();
});

// ═══════════════════════════════════════
//  RESEARCH PANEL
// ═══════════════════════════════════════

function showResearchPanel(d) {
  const panel   = document.getElementById("research-panel");
  const content = document.getElementById("rp-content");
  const nameEl  = document.getElementById("rp-name");
  const roleEl  = document.getElementById("rp-role-org");
  const accent  = document.getElementById("rp-accent");

  const domColor = DOMAINS[d.domain] ? DOMAINS[d.domain].color : "#60a5fa";
  accent.style.background = domColor;
  nameEl.textContent = d.name;
  nameEl.style.color = domColor;
  roleEl.textContent = d.role + (d.org ? "  ·  " + d.org : "");

  let mdText = (typeof RESEARCH !== "undefined" && RESEARCH[d.id])
    ? RESEARCH[d.id]
    : "## " + d.name + "\n\nResearch profile not available — make sure research-data.js is in the same folder as this HTML file.";

  // Strip "Catholics in Tech Podcast" subtitle line
  mdText = mdText.replace(/^###\s*Catholics in Tech Podcast\s*\n?/m, "");

  // Collect ## section headings for TOC
  const headings = [];
  mdText.split("\n").forEach(line => {
    const m = line.match(/^## (.+)$/);
    if (m) headings.push(m[1].trim());
  });

  // Render markdown
  content.innerHTML = (typeof marked !== "undefined")
    ? marked.parse(mdText)
    : "<pre style='white-space:pre-wrap;font-size:12px'>" + mdText.replace(/</g, "&lt;") + "</pre>";

  // Stamp IDs onto h2 elements so TOC links can target them
  content.querySelectorAll("h2").forEach((h2, i) => { h2.id = "rp-s" + i; });

  // Build TOC and prepend to content
  if (headings.length > 0) {
    const toc = document.createElement("div");
    toc.className = "rp-toc";
    const title = document.createElement("div");
    title.className = "rp-toc-title";
    title.textContent = "Contents";
    toc.appendChild(title);
    headings.forEach((heading, i) => {
      const a = document.createElement("a");
      a.href = "#rp-s" + i;
      a.textContent = heading;
      a.addEventListener("click", e => {
        e.preventDefault();
        const target = content.querySelector("#rp-s" + i);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
      });
      toc.appendChild(a);
    });
    content.insertBefore(toc, content.firstChild);
  }

  if (typeof SUMMARIES !== "undefined" && SUMMARIES[d.id]) {
    const sumDiv = document.createElement("div");
    sumDiv.className = "rp-summary";
    sumDiv.textContent = SUMMARIES[d.id];
    const ref = headings.length > 0 ? content.children[1] : content.firstChild;
    content.insertBefore(sumDiv, ref || null);
  }

  content.scrollTop = 0;
  panel.classList.add("visible");
}

document.getElementById("rp-close").addEventListener("click", () => {
  clearNodeSelection();
});

</script>
</body>
